<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Presenze">
<meta name="theme-color" content="#0d0d14">
<title>Presenze</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg:        #0d0d14;
    --surface:   #16161f;
    --card:      #1e1e2e;
    --border:    #2a2a3d;
    --acc:       #f97316;
    --acc-dim:   rgba(249,115,22,0.18);
    --acc-mid:   rgba(249,115,22,0.45);
    --plan-bg:   rgba(249,115,22,0.12);
    --plan-brd:  rgba(249,115,22,0.50);
    --text:      #e8e8f0;
    --text-sec:  #7070a0;
    --text-muted:#3d3d5c;
    --today-brd: #60a5fa;
    --sel-bg:    rgba(96,165,250,0.15);
    --sel-brd:   #60a5fa;
    --danger:    #ef4444;
    --safe-top:  env(safe-area-inset-top, 0px);
    --safe-bot:  env(safe-area-inset-bottom, 0px);
  }

  html, body {
    height: 100%; width: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ─── Layout ─────────────────────────────── */
  #app {
    display: flex; flex-direction: column;
    height: 100dvh;
    padding-top: var(--safe-top);
    padding-bottom: var(--safe-bot);
  }

  /* ─── Header ─────────────────────────────── */
  #header {
    flex-shrink: 0;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px 10px;
  }
  #header-top {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
  }
  #app-title {
    font-size: 11px; font-weight: 700; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--text-sec);
  }
  #btn-multi {
    font-family: 'Nunito', sans-serif;
    font-size: 12px; font-weight: 700;
    background: var(--card); border: 1px solid var(--border);
    color: var(--text-sec); border-radius: 8px;
    padding: 5px 12px; cursor: pointer; transition: all .2s;
  }
  #btn-multi.active {
    background: var(--sel-bg); border-color: var(--sel-brd);
    color: var(--sel-brd);
  }

  /* Month nav */
  #month-nav {
    display: flex; align-items: center; justify-content: space-between;
  }
  .nav-btn {
    width: 36px; height: 36px; border-radius: 10px;
    background: var(--card); border: 1px solid var(--border);
    color: var(--text); font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s;
    font-family: 'Nunito', sans-serif;
  }
  .nav-btn:active { background: var(--border); }
  #month-label {
    font-size: 18px; font-weight: 800; letter-spacing: -0.02em;
    text-align: center; flex: 1;
  }

  /* ─── Stats bar ───────────────────────────── */
  #stats {
    flex-shrink: 0;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .stats-row {
    display: flex;
  }
  .stat-item {
    flex: 1; text-align: center;
    padding: 7px 4px;
    border-right: 1px solid var(--border);
  }
  .stat-item.no-border { border-right: none; }
  .stat-val {
    font-size: 15px; font-weight: 800; color: var(--acc);
    line-height: 1;
  }
  .stat-val.blue { color: var(--today-brd); }
  .stat-lbl {
    font-size: 9px; font-weight: 700; color: var(--text-sec);
    text-transform: uppercase; letter-spacing: 0.08em;
    margin-top: 2px;
  }

  /* ─── Calendar ────────────────────────────── */
  #calendar-wrap {
    flex: 1; overflow-y: auto; padding: 12px 10px 16px;
    -webkit-overflow-scrolling: touch;
  }

  /* Day headers */
  #day-headers {
    display: grid; grid-template-columns: repeat(7, 1fr);
    margin-bottom: 6px;
  }
  .dh {
    text-align: center; font-size: 10px; font-weight: 800;
    color: var(--text-muted); text-transform: uppercase;
    letter-spacing: 0.08em; padding: 4px 0;
  }

  /* Grid */
  #day-grid {
    display: grid; grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }

  .day-cell {
    aspect-ratio: 1;
    border-radius: 12px;
    border: 1.5px solid transparent;
    background: var(--card);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    cursor: pointer; position: relative;
    transition: transform .1s, border-color .15s, background .15s;
    user-select: none;
  }
  .day-cell:active { transform: scale(0.93); }
  .day-cell.empty { background: transparent; cursor: default; }
  .day-cell.empty:active { transform: none; }

  .day-cell.today { border-color: var(--today-brd) !important; }
  .day-num {
    font-size: 15px; font-weight: 700; line-height: 1;
  }
  .day-ore {
    font-size: 9px; font-weight: 700; line-height: 1;
    margin-top: 2px; color: inherit;
  }

  /* Effettiva */
  .day-cell.effettiva {
    background: var(--acc);
    border-color: var(--acc) !important;
  }
  .day-cell.effettiva .day-num { color: #fff; }
  .day-cell.effettiva .day-ore { color: rgba(255,255,255,0.75); }

  /* Pianificata */
  .day-cell.pianificata {
    background: var(--plan-bg);
    border-color: var(--plan-brd) !important;
  }
  .day-cell.pianificata .day-num { color: var(--acc); opacity: 0.7; }
  .day-cell.pianificata .day-ore { color: var(--acc); opacity: 0.6; }

  /* Selected (multi) */
  .day-cell.selected {
    border-color: var(--sel-brd) !important;
    background: var(--sel-bg) !important;
  }
  .day-cell.selected .day-num { color: var(--sel-brd); }

  /* Weekend dim */
  .day-cell.weekend:not(.effettiva):not(.pianificata) .day-num {
    color: var(--text-muted);
  }

  /* Past dim */
  .day-cell.past:not(.effettiva):not(.pianificata) .day-num {
    opacity: 0.45;
  }

  /* Sel check */
  .sel-check {
    position: absolute; top: 3px; right: 3px;
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--sel-brd);
    display: flex; align-items: center; justify-content: center;
    font-size: 8px; color: #fff; font-weight: 900;
    opacity: 0; transition: opacity .15s;
    pointer-events: none;
  }
  .day-cell.selected .sel-check { opacity: 1; }

  /* ─── Multi-action bar ────────────────────── */
  #action-bar {
    flex-shrink: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 10px 16px;
    display: none;
    flex-direction: column; gap: 8px;
  }
  #action-bar.visible { display: flex; }
  #action-count {
    font-size: 12px; font-weight: 700; color: var(--text-sec);
    text-align: center;
  }
  #action-row {
    display: flex; gap: 8px;
  }
  .act-btn {
    flex: 1; font-family: 'Nunito', sans-serif;
    font-size: 13px; font-weight: 800;
    padding: 11px 8px; border-radius: 10px;
    border: none; cursor: pointer; transition: opacity .15s;
  }
  .act-btn:active { opacity: 0.7; }
  #btn-apply-eff  { background: var(--acc); color: #fff; }
  #btn-apply-plan { background: var(--plan-bg); border: 1.5px solid var(--plan-brd); color: var(--acc); }
  #btn-remove     { background: var(--card); border: 1.5px solid var(--border); color: var(--danger); }

  /* ─── Modal ───────────────────────────────── */
  #modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.65);
    display: none; align-items: flex-end; justify-content: center;
    z-index: 100; backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }
  #modal-overlay.open { display: flex; }
  #modal {
    background: var(--card);
    border-radius: 20px 20px 0 0;
    border: 1px solid var(--border); border-bottom: none;
    padding: 0 0 calc(20px + var(--safe-bot));
    width: 100%; max-width: 480px;
    animation: slideUp .25s cubic-bezier(0.32,0.72,0,1);
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }
  #modal-handle {
    width: 40px; height: 4px; border-radius: 2px;
    background: var(--border); margin: 12px auto 16px;
  }
  #modal-date {
    font-size: 13px; font-weight: 700; color: var(--text-sec);
    text-align: center; margin-bottom: 20px; letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  /* Type selector */
  #type-row {
    display: flex; gap: 10px; padding: 0 16px; margin-bottom: 20px;
  }
  .type-btn {
    flex: 1; font-family: 'Nunito', sans-serif;
    padding: 12px 8px; border-radius: 12px;
    font-size: 13px; font-weight: 800;
    border: 1.5px solid var(--border); cursor: pointer;
    background: var(--surface); color: var(--text-sec);
    transition: all .15s;
  }
  .type-btn.sel-eff  { background: var(--acc); border-color: var(--acc); color: #fff; }
  .type-btn.sel-plan { background: var(--plan-bg); border-color: var(--plan-brd); color: var(--acc); }

  /* Ore picker */
  #ore-section { padding: 0 16px; margin-bottom: 20px; }
  #ore-label {
    font-size: 11px; font-weight: 700; color: var(--text-sec);
    letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px;
  }
  #ore-row { display: flex; align-items: center; gap: 12px; }
  .ore-btn {
    width: 44px; height: 44px; border-radius: 10px;
    background: var(--surface); border: 1.5px solid var(--border);
    color: var(--text); font-size: 20px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Nunito', sans-serif; font-weight: 700;
    transition: background .1s;
  }
  .ore-btn:active { background: var(--border); }
  #ore-display {
    flex: 1; text-align: center;
    font-size: 32px; font-weight: 900; color: var(--text);
    line-height: 1;
  }
  #ore-sub { font-size: 11px; color: var(--text-sec); font-weight: 600; }

  /* Quick ore */
  #ore-quick { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
  .qore {
    padding: 5px 12px; border-radius: 8px;
    background: var(--surface); border: 1px solid var(--border);
    font-size: 12px; font-weight: 700; color: var(--text-sec);
    cursor: pointer; transition: all .1s;
    font-family: 'Nunito', sans-serif;
  }
  .qore:active { background: var(--border); }
  .qore.active { background: var(--acc-dim); border-color: var(--acc-mid); color: var(--acc); }

  /* Modal actions */
  #modal-actions { display: flex; gap: 10px; padding: 0 16px; }
  #btn-delete {
    width: 44px; height: 44px; border-radius: 12px;
    background: var(--surface); border: 1.5px solid var(--border);
    color: var(--danger); font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Nunito', sans-serif;
  }
  #btn-save {
    flex: 1; height: 44px; border-radius: 12px;
    background: var(--acc); border: none;
    color: #fff; font-size: 15px; font-weight: 800;
    cursor: pointer; font-family: 'Nunito', sans-serif;
    transition: opacity .15s;
  }
  #btn-save:active { opacity: 0.8; }

  /* No data hint */
  #hint {
    text-align: center; padding: 30px 20px;
    color: var(--text-muted); font-size: 13px; font-weight: 600;
    display: none;
  }
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <div id="header">
    <div id="header-top">
      <div id="app-title">📋 Registro Presenze</div>
      <button id="btn-multi" onclick="toggleMulti()">Seleziona</button>
    </div>
    <div id="month-nav">
      <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
      <div id="month-label"></div>
      <button class="nav-btn" onclick="changeMonth(+1)">›</button>
    </div>
  </div>

  <!-- STATS -->
  <div id="stats">
    <div class="stats-row">
      <div class="stat-item">
        <div class="stat-val" id="st-eff">0</div>
        <div class="stat-lbl">Effettive</div>
      </div>
      <div class="stat-item">
        <div class="stat-val" id="st-ore">0</div>
        <div class="stat-lbl">Ore fatte</div>
      </div>
      <div class="stat-item no-border">
        <div class="stat-val" id="st-med">–</div>
        <div class="stat-lbl">Ore/giorno</div>
      </div>
    </div>
    <div class="stats-row" style="border-top: 1px solid var(--border);">
      <div class="stat-item">
        <div class="stat-val blue" id="st-pla">0</div>
        <div class="stat-lbl">Pianif.</div>
      </div>
      <div class="stat-item">
        <div class="stat-val blue" id="st-orepla">0</div>
        <div class="stat-lbl">Ore da fare</div>
      </div>
      <div class="stat-item no-border">
        <div class="stat-val" id="st-tot">0</div>
        <div class="stat-lbl">Ore totali</div>
      </div>
    </div>
  </div>

  <!-- CALENDAR -->
  <div id="calendar-wrap">
    <div id="day-headers">
      <div class="dh">L</div><div class="dh">M</div><div class="dh">M</div>
      <div class="dh">G</div><div class="dh">V</div>
      <div class="dh" style="color:#5555aa">S</div>
      <div class="dh" style="color:#5555aa">D</div>
    </div>
    <div id="day-grid"></div>
    <div id="hint">Tocca un giorno per segnare la presenza</div>
  </div>

  <!-- MULTI ACTION BAR -->
  <div id="action-bar">
    <div id="action-count"></div>
    <div id="action-row">
      <button class="act-btn" id="btn-apply-eff"  onclick="applyMulti('effettiva')">● Effettiva</button>
      <button class="act-btn" id="btn-apply-plan" onclick="applyMulti('pianificata')">◌ Pianificata</button>
      <button class="act-btn" id="btn-remove"     onclick="applyMulti('remove')">✕</button>
    </div>
  </div>

</div><!-- /app -->

<!-- MODAL -->
<div id="modal-overlay" onclick="modalClose(event)">
  <div id="modal">
    <div id="modal-handle"></div>
    <div id="modal-date"></div>

    <div id="type-row">
      <button class="type-btn" id="tbtn-eff"  onclick="setType('effettiva')">● Effettiva</button>
      <button class="type-btn" id="tbtn-plan" onclick="setType('pianificata')">◌ Pianificata</button>
    </div>

    <div id="ore-section">
      <div id="ore-label">Ore lavorate</div>
      <div id="ore-row">
        <button class="ore-btn" onclick="adjOre(-0.5)">−</button>
        <div id="ore-display">
          <div id="ore-val">8</div>
          <div id="ore-sub">ore</div>
        </div>
        <button class="ore-btn" onclick="adjOre(+0.5)">+</button>
      </div>
      <div id="ore-quick">
        <button class="qore" onclick="setOre(4)">4h</button>
        <button class="qore" onclick="setOre(6)">6h</button>
        <button class="qore" onclick="setOre(7)">7h</button>
        <button class="qore" onclick="setOre(7.5)">7.5h</button>
        <button class="qore" onclick="setOre(8)">8h</button>
        <button class="qore" onclick="setOre(9)">9h</button>
      </div>
    </div>

    <div id="modal-actions">
      <button id="btn-delete" onclick="deleteDay()" title="Rimuovi">🗑</button>
      <button id="btn-save" onclick="saveDay()">Salva</button>
    </div>
  </div>
</div>

<script>
// ── Constants ────────────────────────────────────────────────
const STORAGE_KEY = 'presenze_v2';
const MONTHS_IT = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno',
                   'Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];

// ── State ────────────────────────────────────────────────────
const now = new Date();
let S = {
  year:  now.getFullYear(),
  month: now.getMonth(),
  data:  {},           // { "YYYY-MM-DD": { type, ore } }
  multi: false,
  sel:   new Set(),
  modal: { open: false, key: null, type: 'effettiva', ore: 8 }
};

// ── Persistence ──────────────────────────────────────────────
function load() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
  catch { return {}; }
}
function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(S.data));
}

// ── Key helpers ──────────────────────────────────────────────
function dateKey(y, m, d) {
  return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}
function parseDK(k) {
  const [y,m,d] = k.split('-').map(Number);
  return { y, m: m-1, d };
}

// ── Render calendar ──────────────────────────────────────────
function render() {
  const { year, month } = S;
  document.getElementById('month-label').textContent =
    `${MONTHS_IT[month]} ${year}`;

  const grid = document.getElementById('day-grid');
  grid.innerHTML = '';

  const firstDow = (new Date(year, month, 1).getDay() + 6) % 7; // Mon=0
  const daysInM  = new Date(year, month+1, 0).getDate();
  const todayKey = dateKey(now.getFullYear(), now.getMonth(), now.getDate());

  // Empty leading cells
  for (let i = 0; i < firstDow; i++) {
    const el = document.createElement('div');
    el.className = 'day-cell empty';
    grid.appendChild(el);
  }

  // Day cells
  for (let d = 1; d <= daysInM; d++) {
    const key = dateKey(year, month, d);
    const entry = S.data[key];
    const dow   = (new Date(year, month, d).getDay() + 6) % 7;
    const isWeekend = dow >= 5;
    const isPast    = key < todayKey;
    const isToday   = key === todayKey;
    const isSelected = S.sel.has(key);

    const cell = document.createElement('div');
    cell.className = 'day-cell' +
      (entry ? ` ${entry.type}` : '') +
      (isWeekend ? ' weekend' : '') +
      (isPast && !entry ? ' past' : '') +
      (isToday ? ' today' : '') +
      (isSelected ? ' selected' : '');

    cell.innerHTML = `
      <div class="day-num">${d}</div>
      ${entry ? `<div class="day-ore">${formatOre(entry.ore)}</div>` : ''}
      <div class="sel-check">✓</div>
    `;

    cell.addEventListener('click', () => dayClick(key, d));
    grid.appendChild(cell);
  }

  renderStats();
}

function formatOre(ore) {
  if (!ore) return '';
  return Number.isInteger(ore) ? `${ore}h` : `${ore}h`;
}

// ── Stats ────────────────────────────────────────────────────
function renderStats() {
  const { year, month } = S;
  let effDays = 0, effOre = 0, planDays = 0, planOre = 0;
  const daysInM = new Date(year, month+1, 0).getDate();
  for (let d = 1; d <= daysInM; d++) {
    const e = S.data[dateKey(year, month, d)];
    if (!e) continue;
    if (e.type === 'effettiva')   { effDays++; effOre  += parseFloat(e.ore) || 0; }
    if (e.type === 'pianificata') { planDays++; planOre += parseFloat(e.ore) || 0; }
  }
  const totOre = effOre + planOre;
  document.getElementById('st-eff').textContent    = effDays;
  document.getElementById('st-ore').textContent    = effOre  % 1 === 0 ? effOre  : effOre.toFixed(1);
  document.getElementById('st-med').textContent    = effDays ? (effOre/effDays).toFixed(1) : '–';
  document.getElementById('st-pla').textContent    = planDays;
  document.getElementById('st-orepla').textContent = planOre % 1 === 0 ? planOre : planOre.toFixed(1);
  document.getElementById('st-tot').textContent    = totOre  % 1 === 0 ? totOre  : totOre.toFixed(1);
}

// ── Day click ────────────────────────────────────────────────
function dayClick(key, d) {
  if (S.multi) {
    if (S.sel.has(key)) S.sel.delete(key);
    else S.sel.add(key);
    updateActionBar();
    render();
    return;
  }
  // Open modal
  const entry = S.data[key] || { type: 'effettiva', ore: 8 };
  S.modal = { open: true, key, type: entry.type, ore: entry.ore ?? 8 };
  openModal(key);
}

// ── Modal ────────────────────────────────────────────────────
function openModal(key) {
  const { y, m, d } = parseDK(key);
  const dow = ['Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato','Domenica']
              [(new Date(y, m, d).getDay() + 6) % 7];
  document.getElementById('modal-date').textContent =
    `${dow}, ${d} ${MONTHS_IT[m]} ${y}`;
  syncModalUI();
  document.getElementById('modal-overlay').classList.add('open');
}

function syncModalUI() {
  const { type, ore } = S.modal;
  // Type buttons
  document.getElementById('tbtn-eff').className  = 'type-btn' + (type === 'effettiva'   ? ' sel-eff'  : '');
  document.getElementById('tbtn-plan').className = 'type-btn' + (type === 'pianificata' ? ' sel-plan' : '');
  // Ore
  document.getElementById('ore-val').textContent = ore % 1 === 0 ? ore : ore.toFixed(1);
  // Quick buttons
  document.querySelectorAll('.qore').forEach(b => {
    b.classList.toggle('active', parseFloat(b.textContent) === ore);
  });
  // Delete btn visibility
  document.getElementById('btn-delete').style.display =
    S.data[S.modal.key] ? 'flex' : 'none';
}

function setType(t) { S.modal.type = t; syncModalUI(); }
function setOre(v)  { S.modal.ore  = v; syncModalUI(); }
function adjOre(d) {
  const v = Math.max(0.5, Math.min(24, S.modal.ore + d));
  S.modal.ore = Math.round(v * 2) / 2;
  syncModalUI();
}

function saveDay() {
  const { key, type, ore } = S.modal;
  S.data[key] = { type, ore };
  save(); render(); modalClose();
}

function deleteDay() {
  delete S.data[S.modal.key];
  save(); render(); modalClose();
}

function modalClose(e) {
  if (e && e.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.remove('open');
}

// ── Multi-select ─────────────────────────────────────────────
function toggleMulti() {
  S.multi = !S.multi;
  S.sel.clear();
  const btn = document.getElementById('btn-multi');
  btn.classList.toggle('active', S.multi);
  btn.textContent = S.multi ? 'Fine' : 'Seleziona';
  updateActionBar();
  render();
}

function updateActionBar() {
  const bar = document.getElementById('action-bar');
  const n = S.sel.size;
  if (S.multi && n > 0) {
    bar.classList.add('visible');
    document.getElementById('action-count').textContent =
      `${n} giorno${n !== 1 ? 'i' : ''} selezionato${n !== 1 ? 'i' : ''}`;
  } else {
    bar.classList.remove('visible');
  }
}

function applyMulti(action) {
  // Determine ore default or show mini picker
  const ore = 8; // default for bulk; can extend with picker later
  S.sel.forEach(key => {
    if (action === 'remove') { delete S.data[key]; }
    else { S.data[key] = { type: action, ore }; }
  });
  save();
  S.sel.clear();
  updateActionBar();
  render();
}

// ── Month nav ────────────────────────────────────────────────
function changeMonth(delta) {
  S.month += delta;
  if (S.month < 0)  { S.month = 11; S.year--; }
  if (S.month > 11) { S.month = 0;  S.year++; }
  // NON svuotiamo S.sel: la selezione multipla persiste tra mesi
  if (S.multi) updateActionBar();
  render();
}

// ── Boot ─────────────────────────────────────────────────────
S.data = load();
// Normalizzazione: assicura che ore sia sempre un numero valido
Object.keys(S.data).forEach(k => {
  const e = S.data[k];
  if (e) e.ore = parseFloat(e.ore) || 8;
});
save();
render();
</script>
</body>
